name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract Release Notes from CHANGELOG.md
        run: |
          python3 -c "
          import re, subprocess
          tag = '${{ github.ref_name }}'
          version = tag.lstrip('v')
          notes = ''
          
          # Try extracting from CHANGELOG.md first
          try:
              with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                  content = f.read()
              pattern = rf'(##\s*\[?{re.escape(version)}\]?[^\n]*\n)(.*?)(?=\n##\s*|\Z)'
              match = re.search(pattern, content, re.DOTALL)
              if match:
                  notes = match.group(2).strip()
                  print('Successfully extracted release notes from CHANGELOG.md.')
          except Exception as e:
              print('Could not read CHANGELOG.md:', e)
          
          # Fallback to git log if no notes extracted
          if not notes:
              print('Falling back to git commit logs.')
              try:
                  try:
                      cmd_prev = ['git', 'describe', '--tags', '--abbrev=0', f'{tag}^']
                      res_prev = subprocess.run(cmd_prev, capture_output=True, text=True, check=True)
                      prev_tag = res_prev.stdout.strip()
                      commit_range = f'{prev_tag}..{tag}'
                  except Exception:
                      commit_range = tag
                  
                  cmd_log = ['git', 'log', '--pretty=format:- %s (%h)', commit_range]
                  res_log = subprocess.run(cmd_log, capture_output=True, text=True, check=True)
                  commits = res_log.stdout.strip()
                  notes = f'### Commits in this release:\n\n{commits}' if commits else f'Release {tag}'
              except Exception as e:
                  print('Error fetching git log:', e)
                  notes = f'Release {tag}'
          
          with open('release_notes.md', 'w', encoding='utf-8') as out:
              out.write(notes)
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: release_notes.md
